services:
  postgres:
    image: postgres:16
    container_name: lob-postgres
    environment:
      POSTGRES_DB: lob
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lob_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lob"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  lob_postgres_data:

